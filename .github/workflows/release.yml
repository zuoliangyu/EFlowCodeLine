name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: eflowcodeline-linux-x64.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: eflowcodeline-linux-x64-static.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: eflowcodeline-linux-arm64.tar.gz
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: eflowcodeline-linux-arm64-static.tar.gz
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: eflowcodeline-linux-armv7.tar.gz
            use_cross: true
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: eflowcodeline-windows-x64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            name: eflowcodeline-macos-x64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: eflowcodeline-macos-arm64.tar.gz

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools
      if: matrix.target == 'x86_64-pc-windows-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64

    - name: Install musl tools
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Install cross
      if: matrix.use_cross
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Build binary (cross)
      if: matrix.use_cross
      run: cross build --release --target ${{ matrix.target }}

    - name: Build binary (cargo)
      if: ${{ !matrix.use_cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Linux/macOS
      if: matrix.os != 'windows-latest' && matrix.target != 'x86_64-pc-windows-gnu'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/eflowcodeline dist/eflowcodeline
        cd dist
        tar czf ../${{ matrix.name }} eflowcodeline

    - name: Package Windows
      if: matrix.target == 'x86_64-pc-windows-gnu'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/eflowcodeline.exe dist/eflowcodeline.exe
        cd dist
        zip ../${{ matrix.name }} eflowcodeline.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: ${{ matrix.name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate Release Notes
      uses: orhun/git-cliff-action@v4
      id: git-cliff
      with:
        config: cliff.toml
        args: --latest --strip header
      env:
        OUTPUT: RELEASE_NOTES.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*/*
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false

    - name: Setup Node.js for NPM
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        registry-url: 'https://registry.npmjs.org'

    - name: Extract binaries from archives
      run: |
        mkdir -p extracted

        # macOS x64
        tar -xzf artifacts/eflowcodeline-macos-x64.tar.gz/eflowcodeline-macos-x64.tar.gz -C extracted
        mv extracted/eflowcodeline extracted/eflowcodeline-darwin-x64

        # macOS ARM64
        tar -xzf artifacts/eflowcodeline-macos-arm64.tar.gz/eflowcodeline-macos-arm64.tar.gz -C extracted
        mv extracted/eflowcodeline extracted/eflowcodeline-darwin-arm64

        # Linux x64
        tar -xzf artifacts/eflowcodeline-linux-x64.tar.gz/eflowcodeline-linux-x64.tar.gz -C extracted
        mv extracted/eflowcodeline extracted/eflowcodeline-linux-x64

        # Linux musl (static)
        tar -xzf artifacts/eflowcodeline-linux-x64-static.tar.gz/eflowcodeline-linux-x64-static.tar.gz -C extracted
        mv extracted/eflowcodeline extracted/eflowcodeline-linux-x64-musl

        # Linux ARM64
        tar -xzf artifacts/eflowcodeline-linux-arm64.tar.gz/eflowcodeline-linux-arm64.tar.gz -C extracted
        mv extracted/eflowcodeline extracted/eflowcodeline-linux-arm64

        # Linux ARM64 musl (static)
        tar -xzf artifacts/eflowcodeline-linux-arm64-static.tar.gz/eflowcodeline-linux-arm64-static.tar.gz -C extracted
        mv extracted/eflowcodeline extracted/eflowcodeline-linux-arm64-musl

        # Linux ARMv7
        tar -xzf artifacts/eflowcodeline-linux-armv7.tar.gz/eflowcodeline-linux-armv7.tar.gz -C extracted
        mv extracted/eflowcodeline extracted/eflowcodeline-linux-armv7

        # Windows
        unzip artifacts/eflowcodeline-windows-x64.zip/eflowcodeline-windows-x64.zip -d extracted
        mv extracted/eflowcodeline.exe extracted/eflowcodeline-win32-x64.exe

        ls -la extracted/

    - name: Prepare NPM packages
      run: |
        node npm/scripts/prepare-packages.js

        cp extracted/eflowcodeline-darwin-x64 npm-publish/darwin-x64/eflowcodeline
        cp extracted/eflowcodeline-darwin-arm64 npm-publish/darwin-arm64/eflowcodeline
        cp extracted/eflowcodeline-linux-x64 npm-publish/linux-x64/eflowcodeline
        cp extracted/eflowcodeline-linux-x64-musl npm-publish/linux-x64-musl/eflowcodeline
        cp extracted/eflowcodeline-linux-arm64 npm-publish/linux-arm64/eflowcodeline
        cp extracted/eflowcodeline-linux-arm64-musl npm-publish/linux-arm64-musl/eflowcodeline
        cp extracted/eflowcodeline-linux-armv7 npm-publish/linux-armv7/eflowcodeline
        cp extracted/eflowcodeline-win32-x64.exe npm-publish/win32-x64/eflowcodeline.exe

        chmod +x npm-publish/darwin-x64/eflowcodeline
        chmod +x npm-publish/darwin-arm64/eflowcodeline
        chmod +x npm-publish/linux-x64/eflowcodeline
        chmod +x npm-publish/linux-x64-musl/eflowcodeline
        chmod +x npm-publish/linux-arm64/eflowcodeline
        chmod +x npm-publish/linux-arm64-musl/eflowcodeline
        chmod +x npm-publish/linux-armv7/eflowcodeline

        find npm-publish -name "package.json" -exec echo "=== {} ===" \; -exec head -5 {} \;

    - name: Publish platform packages to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        for platform in darwin-x64 darwin-arm64 linux-x64 linux-x64-musl linux-arm64 linux-arm64-musl linux-armv7 win32-x64; do
          echo "📦 Publishing @zuolan/eflowcodeline-$platform"
          cd npm-publish/$platform
          npm publish --access public
          cd ../..
          echo "✅ Published @zuolan/eflowcodeline-$platform"
        done

    - name: Wait for NPM registry
      run: |
        echo "⏳ Waiting for platform packages to be available on NPM..."
        sleep 30

    - name: Publish main package to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        cd npm-publish/main
        echo "📦 Publishing @zuolan/eflowcodeline"
        npm publish --access public
        echo "✅ Published @zuolan/eflowcodeline"
        echo ""
        echo "🎉 NPM packages published successfully!"
        echo "Install with: npm install -g @zuolan/eflowcodeline"
